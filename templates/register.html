<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register User</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white flex justify-center items-center h-screen">

<div class="bg-zinc-900 p-10 rounded-3xl w-full max-w-md shadow-2xl border border-zinc-800">

    <h1 class="text-3xl font-bold mb-8 text-center text-red-500">
        Register User
    </h1>

    <form
        action="/register"
        method="POST"
        enctype="multipart/form-data"
        class="space-y-5"
    >

        <div>
            <label class="block mb-2 text-sm text-gray-400">
                Full Name
            </label>

            <input
                type="text"
                name="name"
                required
                class="w-full bg-zinc-800 border border-zinc-700 rounded-xl p-3 outline-none"
            >
        </div>


        <div>
            <label class="block mb-2 text-sm text-gray-400">
                Email
            </label>

            <input
                type="email"
                name="email"
                required
                class="w-full bg-zinc-800 border border-zinc-700 rounded-xl p-3 outline-none"
            >
        </div>


        <div>
            <label class="block mb-2 text-sm text-gray-400">
                Password
            </label>

            <input
                type="password"
                name="password"
                required
                class="w-full bg-zinc-800 border border-zinc-700 rounded-xl p-3 outline-none"
            >
        </div>


        <div>
            <label class="block mb-2 text-sm text-gray-400">
                Profile Photo
            </label>

            <input
                type="file"
                name="profile_photo"
                accept="image/*"
                required
                class="w-full bg-zinc-800 border border-zinc-700 rounded-xl p-3"
            >
        </div>


        <button
            type="submit"
            class="w-full bg-red-600 hover:bg-red-700 p-3 rounded-xl font-semibold transition"
        >
            Create User
        </button>

    </form>

</div>

</body>
</html>
