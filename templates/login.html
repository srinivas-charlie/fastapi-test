
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        body {
            font-family: Arial;
            background: #57b970;
            color: #eff1f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-box {
            background: #1e293b;
            padding: 30px;
            border-radius: 10px;
            width: 350px;
        }
        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
        }
        button {
            width: 90%;
            padding: 10px;
            background: #38bdf8;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            align-items: center;
        }
        button:hover {
            background: #9e892b;
        }
        #msg {
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Login</h2>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <div id="msg"></div>
</div>



</body>
</html>
