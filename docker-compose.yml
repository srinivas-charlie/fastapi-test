
services:
  db:
    image: postgres:15-alpine
    container_name: postgres-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - fastapi-net

  app:
    build: .
    container_name: fastapi-app
    ports:
      - "8003:8000"
    environment:
      DATABASE_URL: postgresql://postgres:root@postgres-db:5432/postgres
    depends_on:
      - db
    networks:
      - fastapi-net

networks:
  fastapi-net:

volumes:
  postgres-data: